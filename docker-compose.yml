services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-comanda}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-comanda}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-comanda}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-comanda}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:?Defina WEBHOOK_SIGNING_SECRET no .env}
      VIACEP_BASE_URL: ${VIACEP_BASE_URL:-https://viacep.com.br/ws}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # Só HTTP — SSL no Nginx Proxy Manager apontando para http://host:HTTP_PORT
      - "${HTTP_PORT:-8547}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
